<svg width="300" height="420" viewBox="0 0 300 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#333" stroke-width="0.5"/>
    </pattern>
  </defs>
  
  <rect width="300" height="420" fill="#1a1a1a"/>
  <rect width="300" height="420" fill="url(#grid)"/>
  
  <g transform="translate(150, 210)">
    <!-- Card icon -->
    <rect x="-40" y="-50" width="80" height="100" fill="none" stroke="#666" stroke-width="2" rx="4"/>
    
    <!-- Image frame inside card -->
    <rect x="-35" y="-45" width="70" height="60" fill="none" stroke="#555" stroke-width="1.5" rx="2"/>
    
    <!-- Picture icon -->
    <circle cx="-20" cy="-30" r="5" fill="#555"/>
    <path d="M -35 -10 L -25 -25 L -15 -15 L 5 -30 L 25 -10" fill="none" stroke="#555" stroke-width="2"/>
    
    <!-- Text lines -->
    <line x1="-35" y1="20" x2="35" y2="20" stroke="#555" stroke-width="1.5"/>
    <line x1="-35" y1="28" x2="20" y2="28" stroke="#555" stroke-width="1"/>
    
    <!-- Text below card -->
    <text x="0" y="50" text-anchor="middle" fill="#888" font-size="12" font-family="Arial">
      No Image
    </text>
  </g>
</svg>
